<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A!FS Link Router</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #ec4899;
            --dark: #0f172a;
            --card: #1e293b;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: white;
            overflow-x: hidden;
        }

        h1, h2, h3, .brand {
            font-family: 'Space Grotesk', sans-serif;
        }

        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-size: 200% 200%;
            animation: gradient-shift 15s ease infinite;
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-2px);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 10px 40px -10px rgba(99, 102, 241, 0.2);
        }

        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        #qrcode svg {
            width: 100% !important;
            height: 100% !important;
            border-radius: 12px;
        }
        
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            padding: 0;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            transition: all 0.3s;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
        }

        .sync-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .sync-synced { background: rgba(34, 197, 94, 0.1); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.2); }
        .sync-local { background: rgba(251, 191, 36, 0.1); color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.2); }
        .sync-loading { background: rgba(99, 102, 241, 0.1); color: #6366f1; border: 1px solid rgba(99, 102, 241, 0.2); }

        #lock-screen {
            position: fixed;
            inset: 0;
            z-index: 50;
            background: var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div class="bg-mesh"></div>

    <div id="lock-screen">
        <div class="glass p-8 rounded-2xl max-w-md w-full mx-4 text-center">
            <div class="w-16 h-16 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl mx-auto mb-6 flex items-center justify-center text-2xl font-bold">A!</div>
            <h2 class="text-2xl font-bold mb-2">A!FS Router</h2>
            <div class="space-y-4">
                <div class="text-left">
                    <label class="block text-sm font-medium text-slate-300 mb-2">Security Question</label>
                    <p class="text-sm text-slate-400 mb-2">When was A!FS founded? (yyyy)</p>
                    <input type="password" id="password-input" class="input-field w-full px-4 py-3 rounded-xl text-white" placeholder="Enter year..." onkeydown="if(event.key === 'Enter') checkPassword()">
                </div>
                <button onclick="checkPassword()" class="btn-primary w-full py-3 rounded-xl font-semibold text-white">Unlock</button>
                <p id="error-msg" class="text-red-400 text-sm hidden">Incorrect answer.</p>
            </div>
        </div>
    </div>

    <div id="app" class="hidden flex-1 flex flex-col">
        <header class="glass sticky top-0 z-40 border-b border-white/5">
            <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center font-bold text-lg">A!</div>
                    <h1 class="text-xl font-bold tracking-tight">Link Router</h1>
                </div>
                <div class="flex items-center gap-3">
                    <div id="sync-status" class="sync-badge sync-loading">
                        <div class="w-2 h-2 rounded-full bg-current animate-pulse"></div>
                        <span>Initializing...</span>
                    </div>
                    <button onclick="location.reload()" class="text-slate-400 hover:text-white" title="Lock App">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    </button>
                </div>
            </div>
        </header>

        <main class="flex-1 max-w-6xl mx-auto w-full px-4 py-8 grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="space-y-6">
                <div class="glass-card rounded-2xl p-6">
                    <h2 class="text-lg font-semibold mb-4">Create New Chain</h2>
                    <form id="create-form" class="space-y-4" onsubmit="handleCreate(event)">
                        <div>
                            <label class="block text-sm font-medium text-slate-300">Note / Name</label>
                            <input type="text" id="note-input" required class="input-field w-full px-4 py-3 rounded-xl text-white" placeholder="e.g. Instagram" oninput="updateSlugPreview()">
                            <p class="text-xs text-slate-500 mt-1">Slug: <span id="slug-preview" class="text-indigo-400 font-mono">...</span></p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-300">Target URL</label>
                            <input type="url" id="url-input" required class="input-field w-full px-4 py-3 rounded-xl text-white" placeholder="https://google.com">
                        </div>
                        <button type="submit" class="btn-primary w-full py-3 rounded-xl font-semibold text-white">Create Chain</button>
                    </form>
                </div>

                <div class="glass-card rounded-2xl p-6">
                    <h2 class="text-lg font-semibold mb-4">Cloud Sync</h2>
                    <button onclick="publishToGitHub()" class="btn-primary w-full py-3 rounded-xl font-semibold flex items-center justify-center gap-2 mb-4">
                        Publish to GitHub
                    </button>
                    <div class="flex gap-2">
                        <button onclick="exportChains()" class="flex-1 bg-slate-700 py-2 rounded-xl text-sm hover:bg-slate-600 transition-colors">Backup JSON</button>
                        <button onclick="reloadFromGitHub()" class="flex-1 bg-slate-700 py-2 rounded-xl text-sm hover:bg-slate-600 transition-colors">Reload Cloud</button>
                    </div>
                </div>

                <div id="qr-panel" class="glass-card rounded-2xl p-6 hidden">
                    <h2 class="text-lg font-semibold mb-4 text-center">QR Code Studio</h2>
                    <div class="flex flex-col items-center gap-4">
                        <div id="qrcode" class="w-48 h-48 bg-white rounded-xl p-2"></div>
                        <input type="color" id="qr-color" value="#000000" onchange="updateQRColor()">
                        <div class="flex gap-2 w-full">
                            <button onclick="downloadQR('png')" class="flex-1 bg-indigo-500/20 py-2 rounded-lg text-sm hover:bg-indigo-500/30 transition-colors">PNG</button>
                            <button onclick="downloadQR('svg')" class="flex-1 bg-indigo-500/20 py-2 rounded-lg text-sm hover:bg-indigo-500/30 transition-colors">SVG</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="glass-card rounded-2xl p-6 min-h-[400px]">
                    <h2 class="text-lg font-semibold mb-4">Active Chains</h2>
                    <div id="chains-list" class="space-y-3"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- Configuration ---
        const GITHUB_REPO = 'FoodsharingFin/dynlink';
        const STORAGE_KEY = 'aifs_link_chains';
        
        // --- State ---
        let chains = [];
        let githubChains = [];
        let currentQRSlug = null;

        // --- Auth ---
        function checkPassword() {
            const input = document.getElementById('password-input').value;
            if (input === '2024') {
                const lockScreen = document.getElementById('lock-screen');
                
                // Fade out effect
                lockScreen.style.opacity = '0';
                
                // Wait for the transition, then hide and show app
                setTimeout(() => {
                    lockScreen.style.display = 'none';
                    document.getElementById('app').classList.remove('hidden');
                    loadChains(); // Load the data now that we're in
                }, 300);
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
            }
        }

        // --- Core Functions ---
        async function loadChains() {
            updateStatus('loading', 'Fetching data...');
            try {
                // Fetch using Netlify function
                const response = await fetch(`/.netlify/functions/updateRepo?_=${Date.now()}`);
                if (response.ok) {
                    const data = await response.json();
                    chains = data.chains || [];
                    githubChains = JSON.parse(JSON.stringify(chains));
                } else {
                    console.log('No chains file yet or server error. Starting fresh.');
                }
            } catch (err) {
                console.error('Load failed:', err);
            }
            renderChains();
            updateSyncStatus();
        }

        async function publishToGitHub() {
            updateStatus('loading', 'Publishing...');
            try {
                const data = { chains, exported: new Date().toISOString() };
                const response = await fetch('/.netlify/functions/updateRepo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    githubChains = JSON.parse(JSON.stringify(chains));
                    alert('Success! Changes are now live.');
                } else {
                    const errorMsg = await response.json();
                    throw new Error(errorMsg.error || 'Server error');
                }
            } catch (err) {
                alert('Publish failed: ' + err.message);
            }
            updateSyncStatus();
        }

        function renderChains() {
            const list = document.getElementById('chains-list');
            if (chains.length === 0) {
                list.innerHTML = '<p class="text-slate-500 text-center py-8">No chains found. Create one on the left!</p>';
                return;
            }
            list.innerHTML = chains.map(c => `
                <div class="glass p-4 rounded-xl flex justify-between items-center group">
                    <div class="overflow-hidden pr-4">
                        <h3 class="font-semibold text-indigo-400 truncate">${c.note}</h3>
                        <p class="text-xs text-slate-400 truncate max-w-[200px] md:max-w-[300px]">${c.url}</p>
                    </div>
                    <div class="flex gap-2 flex-shrink-0">
                        <button onclick="showQRPanel('${c.slug}')" class="p-2 hover:bg-white/10 rounded-lg text-slate-300" title="Generate QR">QR</button>
                        <button onclick="updateChain(${c.id})" class="p-2 hover:bg-white/10 rounded-lg text-blue-400" title="Edit Destination URL">Edit</button>
                        <button onclick="deleteChain(${c.id})" class="p-2 hover:bg-white/10 rounded-lg text-red-400" title="Delete Chain">×</button>
                    </div>
                </div>
            `).join('');
        }

        // --- Helpers ---
        function updateSyncStatus() {
            const isSynced = JSON.stringify(chains) === JSON.stringify(githubChains);
            isSynced ? updateStatus('synced', 'Cloud Synced') : updateStatus('local', 'Unpublished Changes');
        }

        function updateStatus(type, text) {
            const el = document.getElementById('sync-status');
            el.className = `sync-badge sync-${type}`;
            el.innerHTML = `<div class="w-2 h-2 rounded-full bg-current ${type==='loading'?'animate-pulse':''}"></div><span>${text}</span>`;
        }

        function handleCreate(e) {
            e.preventDefault();
            const note = document.getElementById('note-input').value;
            const url = document.getElementById('url-input').value;
            const slug = slugify(note);

            if (chains.find(c => c.slug === slug)) {
                return alert('A chain with this name already exists!');
            }

            chains.push({ id: Date.now(), slug, note, url, visits: 0 });
            document.getElementById('create-form').reset();
            updateSlugPreview();
            renderChains();
            updateSyncStatus();
            showQRPanel(slug);
        }

        function slugify(text) {
            return text.toLowerCase().replace(/[^\w ]+/g, '').replace(/ +/g, '-');
        }

        function updateSlugPreview() {
            const note = document.getElementById('note-input').value;
            document.getElementById('slug-preview').innerText = slugify(note) || '...';
        }

        function deleteChain(id) {
            if (confirm('Permanently delete this chain?')) {
                chains = chains.filter(c => c.id !== id);
                renderChains();
                updateSyncStatus();
                document.getElementById('qr-panel').classList.add('hidden');
            }
        }

        function updateChain(id) {
            const c = chains.find(x => x.id === id);
            const newUrl = prompt('Enter new destination URL:', c.url);
            if (newUrl && newUrl !== c.url) { 
                c.url = newUrl; 
                renderChains(); 
                updateSyncStatus(); 
            }
        }

        // --- QR Logic ---
        function showQRPanel(slug) {
            currentQRSlug = slug;
            document.getElementById('qr-panel').classList.remove('hidden');
            generateQR();
        }

        function generateQR() {
            const color = document.getElementById('qr-color').value;
            const url = `https://${GITHUB_REPO.split('/')[0]}.github.io/dynlink/?id=${currentQRSlug}`;
            const qr = qrcode(0, 'H');
            qr.addData(url);
            qr.make();
            document.getElementById('qrcode').innerHTML = qr.createSvgTag(5);
            
            // Apply color to the SVG
            const svg = document.querySelector('#qrcode svg');
            if (svg) svg.style.fill = color;
        }

        function updateQRColor() { 
            generateQR(); 
        }

        async function reloadFromGitHub() {
            if (confirm('This will discard any unpublished local changes. Continue?')) {
                await loadChains();
            }
        }

        function exportChains() {
            const blob = new Blob([JSON.stringify({chains}, null, 2)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'chains_backup.json';
            a.click();
        }

        // Download logic
        function downloadQR(format) {
            const svg = document.querySelector('#qrcode svg');
            const svgData = new XMLSerializer().serializeToString(svg);
            if (format === 'svg') {
                const blob = new Blob([svgData], {type: 'image/svg+xml'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `qr-${currentQRSlug}.svg`;
                a.click();
            } else {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const img = new Image();
                img.onload = () => {
                    canvas.width = 1000; canvas.height = 1000;
                    ctx.fillStyle = 'white'; ctx.fillRect(0,0,1000,1000);
                    ctx.drawImage(img, 0, 0, 1000, 1000);
                    const a = document.createElement('a');
                    a.href = canvas.toDataURL('image/png');
                    a.download = `qr-${currentQRSlug}.png`;
                    a.click();
                };
                img.src = 'data:image/svg+xml;base64,' + btoa(svgData);
            }
        }
    </script>
</body>
</html>
